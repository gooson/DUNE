name: UI Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'DUNE/**'
      - 'DUNEWatch/**'
      - 'DUNEUITests/**'
      - 'DUNEWatchUITests/**'
      - 'scripts/test-ui.sh'
      - 'scripts/test-watch-ui.sh'
      - 'scripts/lib/regen-project.sh'
      - '.github/workflows/test-ui.yml'

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  SIMULATOR_BOOT_TIMEOUT: '300'
  SIMULATOR_BOOT_RETRIES: '2'

jobs:
  ios-ui-tests:
    if: github.event.pull_request.draft == false
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available iOS simulators ──"
          xcrun simctl list devices available | grep -A5 "iOS" | head -30

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run iOS UI Tests
        run: scripts/test-ui.sh --stream-log --smoke --skip-testing DUNEUITests/HealthKitPermissionUITests

      - name: Upload iOS UI test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-test-log
          path: .xcodebuild/ui-test.log
          retention-days: 7

  watch-ui-tests:
    if: github.event.pull_request.draft == false
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available watchOS simulators ──"
          xcrun simctl list devices available | grep -A5 "watchOS" | head -30

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run watch UI Tests
        run: scripts/test-watch-ui.sh --stream-log --smoke --log-file .xcodebuild/watch-ui-test.log

      - name: Upload watch UI test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-ui-test-log
          path: .xcodebuild/watch-ui-test.log
          retention-days: 7
