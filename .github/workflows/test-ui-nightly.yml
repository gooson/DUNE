name: Nightly Full Tests (Unit + UI)

on:
  schedule:
    # GitHub Actions schedule uses UTC. 19:00 UTC = 04:00 KST (next day).
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Simulator boot on CI can be slow; give the boot helper more time and a retry.
env:
  SIMULATOR_BOOT_TIMEOUT: '300'
  SIMULATOR_BOOT_RETRIES: '2'

jobs:
  nightly-ios-unit-tests:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available iOS simulators ──"
          xcrun simctl list devices available | grep -A5 "iOS" | head -30

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run iOS Unit Tests
        run: scripts/test-unit.sh --stream-log --ios-only --log-file .xcodebuild/unit-test-nightly.log

      - name: Upload iOS nightly unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-nightly-log
          path: .xcodebuild/unit-test-nightly.log
          retention-days: 14

  nightly-watch-unit-tests:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available watchOS simulators ──"
          xcrun simctl list devices available | grep -A5 "watchOS" | head -30

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run watch Unit Tests
        run: scripts/test-unit.sh --stream-log --watch-only --log-file .xcodebuild/watch-unit-test-nightly.log

      - name: Upload watch nightly unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-unit-test-nightly-log
          path: .xcodebuild/watch-unit-test-nightly.log
          retention-days: 14

  nightly-ios-ui-tests:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available iOS simulators ──"
          xcrun simctl list devices available | grep -A5 "iOS" | head -30

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run Full UI Tests
        run: scripts/test-ui.sh --stream-log --skip-testing DUNEUITests/HealthKitPermissionUITests --log-file .xcodebuild/ui-test-nightly.log

      - name: Upload iOS nightly test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-test-nightly-log
          path: .xcodebuild/ui-test-nightly.log
          retention-days: 14

  nightly-watch-ui-tests:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available watchOS simulators ──"
          xcrun simctl list devices available | grep -A5 "watchOS" | head -30

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run watch UI tests
        run: scripts/test-watch-ui.sh --stream-log --log-file .xcodebuild/watch-ui-test-nightly.log

      - name: Upload watch nightly test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-ui-test-nightly-log
          path: .xcodebuild/watch-ui-test-nightly.log
          retention-days: 14
