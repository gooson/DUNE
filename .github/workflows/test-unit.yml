name: Unit Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'DUNE/**'
      - 'DUNEWatch/**'
      - 'DUNETests/**'
      - 'DUNEWatchTests/**'
      - 'scripts/**'
      - '.github/workflows/test-unit.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SIMULATOR_BOOT_TIMEOUT: '300'
  SIMULATOR_BOOT_RETRIES: '2'

jobs:
  unit-tests:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Simulator diagnostics
        if: always()
        run: |
          echo "── Xcode version ──"
          xcodebuild -version
          echo ""
          echo "── Available runtimes ──"
          xcrun simctl list runtimes
          echo ""
          echo "── Available simulators (iOS + watchOS) ──"
          xcrun simctl list devices available | grep -E "(iOS|watchOS)" -A5 | head -40

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run Unit Tests
        run: scripts/test-unit.sh --stream-log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: .xcodebuild/unit-test*.log
          retention-days: 7
