name: DUNE
options:
  bundleIdPrefix: com.raftel
  developmentLanguage: en
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
    visionOS: "26.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: "4GWU9QB2JZ"
    CODE_SIGN_IDENTITY: "iPhone Developer"

schemes:
  DUNE:
    build:
      targets:
        DUNE: all
        DUNEWatch: all
        DUNEWidget: all
        DUNETests: [test]
        DUNEWatchTests: [test]
        DUNEUITests: [test]
    test:
      targets:
        - DUNETests
        - DUNEWatchTests
        - DUNEUITests

  DUNETests:
    build:
      targets:
        DUNE: all
        DUNETests: [test]
    test:
      targets:
        - DUNETests

  DUNEWatch:
    build:
      targets:
        DUNEWatch: all

  DUNEWatchTests:
    build:
      targets:
        DUNEWatch: all
        DUNEWatchTests: [test]
    test:
      targets:
        - DUNEWatchTests

  DUNEUITests:
    build:
      targets:
        DUNE: all
        DUNEUITests: [test]
    test:
      testPlans:
        - path: ../DUNEUITests/DUNEUITests-PR.xctestplan
          defaultPlan: true
        - path: ../DUNEUITests/DUNEUITests-Full.xctestplan
        - path: ../DUNEUITests/UITests-CI.xctestplan
      targets:
        - DUNEUITests

  DUNEWatchUITests:
    build:
      targets:
        DUNEWatch: all
        DUNEWatchUITests: [test]
    test:
      testPlans:
        - path: ../DUNEWatchUITests/DUNEWatchUITests-PR.xctestplan
          defaultPlan: true
        - path: ../DUNEWatchUITests/DUNEWatchUITests-Full.xctestplan
        - path: ../DUNEWatchUITests/WatchUITests-CI.xctestplan
      targets:
        - DUNEWatchUITests

  DUNEVision:
    build:
      targets:
        DUNEVision: all

targets:
  DUNE:
    type: application
    platform: iOS
    sources:
      - path: App
        group: DUNE
      - path: Data
        group: DUNE
      - path: Domain
        group: DUNE
      - path: Presentation
        group: DUNE
      - path: Resources
        group: DUNE
      # Shared Localization
      - path: ../Shared/Resources/Localizable.xcstrings
        group: Shared
      # Shared Colors
      - path: ../Shared/Resources/Colors.xcassets
        group: Shared/Resources
      # Shared Widget Data
      - path: ../Shared/WidgetScoreData.swift
        group: Shared
      - path: ../Shared/WidgetSurfaceAccessibility.swift
        group: Shared
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/DUNE.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve
        PRODUCT_NAME: DUNE
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.4.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: DUNE
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "DUNE needs access to your health data to calculate condition scores and track your fitness progress."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "DUNE may write workout and body composition data to Health."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "DUNE uses your location for weather conditions and to track distance during outdoor cardio workouts."
        INFOPLIST_KEY_NSMotionUsageDescription: "DUNE uses motion data to measure steps, pace, and cadence during cardio workouts."
        INFOPLIST_KEY_NSCameraUsageDescription: "DUNE uses the camera to capture posture assessment photos for body alignment analysis."
    entitlements:
      path: Resources/DUNE.entitlements
      properties:
        aps-environment: development
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.raftel.dailve
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
        com.apple.security.application-groups:
          - group.com.raftel.dailve
    dependencies:
      - sdk: HealthKit.framework
      - sdk: GroupActivities.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
      - target: DUNEWatch
        embed: true
      - target: DUNEWidget
        embed: true

  DUNEWatch:
    type: application
    platform: watchOS
    sources:
      - path: ../DUNEWatch
      # Shared Colors
      - path: ../Shared/Resources/Colors.xcassets
        group: Shared/Resources
      # Shared persistence stores
      - path: Data/Persistence/Models
      - path: Data/Persistence/Migration
      # Shared Domain enums (required by @Model files)
      - path: Domain/Models/ExerciseCategory.swift
      - path: Domain/Models/MuscleGroup.swift
      - path: Domain/Models/Equipment.swift
      - path: Domain/Models/ExerciseDefinition.swift
      - path: Domain/Models/WorkoutActivityType.swift
      - path: Domain/Models/BodyPart.swift
      - path: Domain/Models/InjurySeverity.swift
      - path: Domain/Models/InjuryInfo.swift
      - path: Domain/Models/HabitType.swift
      - path: Domain/Models/CardioSecondaryUnit.swift
      - path: Domain/Models/WorkoutMode.swift
      - path: Domain/Models/AppTheme.swift
      - path: Domain/Models/WatchConnectivityModels.swift
      - path: Domain/Models/HealthMetric.swift
      - path: Domain/Models/HeartRateZone.swift
      - path: Domain/Models/WorkoutIntensity.swift
      - path: Domain/Models/PostureMetric.swift
      - path: Domain/UseCases/WorkoutIntensityService.swift
      # Shared Presentation helpers for set-level RPE
      - path: Presentation/Shared/Extensions/ExerciseRecord+SetRPE.swift
      # Shared HealthKit mapping (needed for cardio workout configuration)
      - path: Data/HealthKit/WorkoutActivityType+HealthKit.swift
      - path: Data/HealthKit/ExerciseCategory+HealthKit.swift
      # Shared Presentation extensions
      - path: Presentation/Shared/Extensions/WorkoutActivityType+Icon.swift
      - path: Presentation/Shared/Extensions/AppTheme+View.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.watchkitapp
        PRODUCT_NAME: DUNEWatch
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.4.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ../DUNEWatch/Resources/Info.plist
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: DUNE
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: "4GWU9QB2JZ"
        CODE_SIGN_IDENTITY: "Apple Development"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.raftel.dailve
        INFOPLIST_KEY_NSHealthShareUsageDescription: "DUNE needs access to your health data to track heart rate during workouts."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "DUNE records your workout data to Health."
        CODE_SIGN_ENTITLEMENTS: ../DUNEWatch/DUNEWatch.entitlements
    entitlements:
      path: ../DUNEWatch/DUNEWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.raftel.dailve
        com.apple.developer.icloud-services:
          - CloudKit
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework

  DUNEWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ../DUNEWidget
      - path: ../Shared/Resources/Localizable.xcstrings
        group: Shared
      # Shared Colors
      - path: ../Shared/Resources/Colors.xcassets
        group: Shared/Resources
      # Shared Widget Data
      - path: ../Shared/WidgetScoreData.swift
        group: Shared
      - path: ../Shared/WidgetSurfaceAccessibility.swift
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.widget
        PRODUCT_NAME: DUNEWidget
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.4.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ../DUNEWidget/Resources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: DUNE Widget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: "4GWU9QB2JZ"
        CODE_SIGN_IDENTITY: "iPhone Developer"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    entitlements:
      path: ../DUNEWidget/Resources/DUNEWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.raftel.dailve
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  DUNETests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../DUNETests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DUNE.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DUNE"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: DUNE

  DUNEWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: ../DUNEWatchTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.watch.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: DUNEWatch
    dependencies:
      - target: DUNEWatch

  DUNEUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ../DUNEUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: DUNE
    dependencies:
      - target: DUNE

  DUNEWatchUITests:
    type: bundle.ui-testing
    platform: watchOS
    sources:
      - path: ../DUNEWatchUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.watch.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: DUNEWatch
    dependencies:
      - target: DUNEWatch

  DUNEVision:
    type: application
    platform: visionOS
    sources:
      - path: ../DUNEVision
      - path: App/AppLogger.swift
      - path: App/AppSection.swift
      # Shared Domain layer (100% reusable)
      - path: Domain
        excludes:
          - "Models/TemplateWorkoutConfig.swift"
          - "Models/WatchConnectivityModels.swift"
          - "UseCases/HealthDataAggregator.swift"
          - "UseCases/WorkoutRecommendationService.swift"
      - path: Data/ExerciseLibraryService.swift
      - path: Data/ExerciseDescriptions.swift
      - path: Data/Resources/exercises.json
      - path: Data/Resources/whats-new.json
      # Shared persistence for mirrored snapshot fallback
      - path: Data/Persistence/HealthSnapshotMirrorContainerFactory.swift
      - path: Data/Persistence/Models/HealthSnapshotMirrorRecord.swift
      - path: Data/Persistence/Models/ExerciseRecord.swift
      - path: Data/Persistence/Models/WorkoutSet.swift
      - path: Data/Persistence/Models/BodyCompositionRecord.swift
      - path: Data/Persistence/Models/HourlyScoreSnapshot.swift
      - path: Data/Persistence/Migration/PersistentStoreRecovery.swift
      - path: Data/Persistence/NotificationSettingsStore.swift
      - path: Data/Persistence/NotificationThrottleStore.swift
      - path: Data/Persistence/PersonalRecordStore.swift
      # Shared HealthKit services
      - path: Data/HealthKit
        excludes:
          - "CardioSessionManager.swift"
      # Shared services
      - path: Data/Services
        excludes:
          - "AIWorkoutTemplateGenerator.swift"
          - "BedtimeWatchReminderScheduler.swift"
          - "HealthSnapshotMirrorStore.swift"
          - "MirroringSharedHealthDataService.swift"
          - "NotificationServiceImpl.swift"
          - "WidgetDataWriter.swift"
      - path: Presentation/Shared/Components/MuscleBodyShape.swift
      - path: Presentation/Shared/Components/MuscleMapData.swift
      - path: Resources/Models/muscle_body.usdz
      - path: Presentation/Shared/Components/MuscleMap3DScene.swift
      - path: Presentation/Shared/Extensions/Equipment+View.swift
      - path: Presentation/Shared/Extensions/Double+Formatting.swift
      - path: Presentation/Shared/Extensions/ExerciseRecord+WeeklyVolume.swift
      - path: Presentation/Shared/Extensions/MuscleGroup+View.swift
      - path: Presentation/Shared/Extensions/FatigueLevel+DisplayName.swift
      - path: Presentation/Immersive/VisionImmersiveExperienceViewModel.swift
      - path: Presentation/Vision
      - path: ../Shared/Resources/Localizable.xcstrings
        group: Shared
      # Shared Colors
      - path: ../Shared/Resources/Colors.xcassets
        group: Shared/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.vision
        PRODUCT_NAME: DUNEVision
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.4.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: VisionAppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ../DUNEVision/Resources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: DUNE
        INFOPLIST_KEY_CFBundleIconName: VisionAppIcon
        XROS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: "4GWU9QB2JZ"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: ../DUNEVision/Resources/DUNEVision.entitlements
        INFOPLIST_KEY_NSHealthShareUsageDescription: "DUNE needs access to your health data to display condition scores, workout history, and health trends."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "DUNE may write workout and body composition data to Health."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "DUNE uses the microphone to capture voice workout drafts in Vision Pro."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "DUNE uses speech recognition to turn spoken workout commands into structured drafts."
    entitlements:
      path: ../DUNEVision/Resources/DUNEVision.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.group-session: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.raftel.dailve
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
    dependencies:
      - sdk: HealthKit.framework
      - sdk: GroupActivities.framework
      - sdk: Speech.framework
      - target: DUNEVisionWidgets
        embed: true

  DUNEVisionWidgets:
    type: app-extension
    platform: visionOS
    sources:
      - path: ../DUNEVisionWidgets
      # Shared Colors
      - path: ../Shared/Resources/Colors.xcassets
        group: Shared/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raftel.dailve.vision.widgets
        PRODUCT_NAME: DUNEVisionWidgets
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.4.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ../DUNEVisionWidgets/Resources/Info.plist
        XROS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: "4GWU9QB2JZ"
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
